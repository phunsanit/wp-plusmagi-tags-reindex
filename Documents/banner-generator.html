<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlusMagi Banner Generator</title>
  <style>
    :root {
      --bg-a: #16002b;
      --bg-b: #0b4bb8;
      --frame: rgba(255, 255, 255, 0.1);
      --glow: rgba(110, 98, 255, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 22%, rgba(184, 0, 255, 0.2), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(74, 185, 255, 0.22), transparent 24%),
        linear-gradient(135deg, #0a0d18, #0f1730 58%, #090f20);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: white;
      display: grid;
      gap: 28px;
      justify-content: start;
    }

    .banner {
      position: relative;
      overflow: hidden;
      background: linear-gradient(110deg, var(--bg-a), var(--bg-b));
      border: 1px solid var(--frame);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      isolation: isolate;
    }

    .banner::before {
      content: "";
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 22% 25%, rgba(211, 55, 255, 0.28), transparent 24%),
        radial-gradient(circle at 80% 28%, rgba(67, 205, 255, 0.26), transparent 26%),
        url("./banner-source.png") center center / cover no-repeat;
      filter: blur(26px) saturate(1.2);
      transform: scale(1.08);
      opacity: 0.92;
      z-index: -3;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(13, 5, 30, 0.5), rgba(13, 5, 30, 0.08) 38%, rgba(7, 15, 45, 0.26)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 120px);
      z-index: -2;
      pointer-events: none;
    }

    .banner .aura {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 50%, rgba(182, 66, 255, 0.24), transparent 30%),
        radial-gradient(circle at 70% 50%, rgba(62, 204, 255, 0.2), transparent 26%);
      mix-blend-mode: screen;
      opacity: 0.95;
      pointer-events: none;
    }

    .banner .panel {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .banner .panel img {
      height: 64%;
      width: auto;
      max-height: 100%;
      display: block;
      transform: translateY(0);
      filter: drop-shadow(0 18px 34px rgba(8, 8, 30, 0.45));
    }

    #banner-large {
      width: 1544px;
      height: 500px;
    }

    #banner-small {
      width: 772px;
      height: 250px;
    }

    #banner-small .panel img {
      height: 68%;
      transform: translateY(-18%);
    }
  </style>
</head>
<body>
  <div class="banner" id="banner-large">
    <div class="aura"></div>
    <div class="panel">
      <img src="./banner-source.png" alt="PlusMagi WP Search banner art">
    </div>
  </div>

  <div class="banner" id="banner-small">
    <div class="aura"></div>
    <div class="panel">
      <img src="./banner-source.png" alt="PlusMagi WP Search banner art small">
    </div>
  </div>
</body>
</html>
